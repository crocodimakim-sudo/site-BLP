  <!-- Accent line under logo -->
  <rect x="80" y="185" width="200" height="3" fill="url(#accentGrad)" rx="2"/>

  <!-- Main heading -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-0.5">Дилерская программа</text>
  <text x="80" y="315" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-0.5">BLP Board</text>

